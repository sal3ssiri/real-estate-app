<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>عدادات العقار</title>

<style>
:root{
  --bg:#f6f8fb;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --line:#e5eaf1;
  --primary:#16a34a;
  --navy:#0f172a;
  --blue:#2563eb;
  --orange:#f59e0b;
  --red:#dc2626;
  --purple:#7c3aed;
  --water:#0891b2;
  --shadow:0 14px 35px rgba(15,23,42,.08);
  --radius:20px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Tahoma,Arial,sans-serif;
}

body{
  background:
    radial-gradient(circle at top left, rgba(22,163,74,.08), transparent 30%),
    var(--bg);
  color:var(--text);
  min-height:100vh;
}

.page{
  max-width:1440px;
  margin:0 auto;
  padding:28px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:20px;
  margin-bottom:20px;
}

.title h1{
  font-size:34px;
  letter-spacing:-.5px;
  margin-bottom:8px;
}

.title p{
  color:var(--muted);
  font-size:15px;
}

.header-actions{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}

.user-pill{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:999px;
  padding:10px 14px;
  box-shadow:0 6px 18px rgba(15,23,42,.05);
  font-size:13px;
  color:var(--muted);
}

.btn{
  border:0;
  border-radius:12px;
  padding:12px 18px;
  cursor:pointer;
  font-size:14px;
  font-weight:700;
  transition:.2s ease;
  white-space:nowrap;
}

.btn:hover{
  transform:translateY(-1px);
  opacity:.95;
}

.btn:disabled{
  opacity:.55;
  cursor:not-allowed;
  transform:none;
}

.btn-primary{
  background:var(--primary);
  color:white;
}

.btn-dark{
  background:var(--navy);
  color:white;
}

.btn-light{
  background:#e2e8f0;
  color:#0f172a;
}

.btn-danger{
  background:var(--red);
  color:white;
}

.property-strip{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  border-radius:24px;
  padding:22px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:18px;
  overflow:hidden;
  position:relative;
}

.property-strip:before{
  content:"";
  position:absolute;
  width:220px;
  height:220px;
  border-radius:50%;
  background:rgba(22,163,74,.22);
  top:-110px;
  left:-80px;
}

.property-main{
  position:relative;
  z-index:1;
}

.property-main h2{
  font-size:26px;
  margin-bottom:8px;
}

.property-meta{
  color:#cbd5e1;
  font-size:14px;
}

.property-badge{
  display:inline-block;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.2);
  padding:5px 12px;
  border-radius:999px;
  font-size:12px;
  color:white;
}

.property-summary{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  position:relative;
  z-index:1;
  min-width:360px;
}

.property-mini{
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.14);
  border-radius:16px;
  padding:13px;
  text-align:center;
}

.property-mini span{
  display:block;
  color:#cbd5e1;
  font-size:12px;
  margin-bottom:7px;
}

.property-mini strong{
  font-size:23px;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  margin-bottom:18px;
}

.kpi{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:18px;
  box-shadow:var(--shadow);
  position:relative;
  overflow:hidden;
}

.kpi:before{
  content:"";
  position:absolute;
  inset:auto 0 0 0;
  height:4px;
  background:linear-gradient(90deg,var(--primary),#22c55e);
}

.kpi-label{
  color:var(--muted);
  font-size:13px;
  margin-bottom:10px;
}

.kpi-value{
  font-size:32px;
  font-weight:800;
  letter-spacing:-1px;
}

.filters{
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(8px);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:16px;
  display:grid;
  grid-template-columns:2fr 1fr 1fr;
  gap:12px;
  margin-bottom:22px;
}

input,
select,
textarea{
  width:100%;
  border:1px solid #d8e0ea;
  background:white;
  border-radius:12px;
  padding:12px 13px;
  font-size:14px;
  outline:none;
}

input:focus,
select:focus,
textarea:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 4px rgba(22,163,74,.12);
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(310px,1fr));
  gap:18px;
}

.meter-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:24px;
  box-shadow:var(--shadow);
  padding:20px;
  transition:.2s ease;
  position:relative;
  overflow:hidden;
}

.meter-card:hover{
  transform:translateY(-3px);
  box-shadow:0 18px 44px rgba(15,23,42,.12);
}

.meter-card:before{
  content:"";
  position:absolute;
  top:0;
  right:0;
  width:7px;
  height:100%;
  background:var(--orange);
}

.meter-card.water:before{
  background:var(--water);
}

.card-head{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-bottom:14px;
}

.meter-title{
  font-size:22px;
  font-weight:800;
  margin-bottom:7px;
}

.meter-id{
  color:var(--muted);
  font-size:13px;
  direction:ltr;
  text-align:right;
}

.meter-icon{
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:14px;
  background:#fff7ed;
  font-size:22px;
}

.meter-icon.water{
  background:#ecfeff;
}

.status-badge{
  display:inline-block;
  padding:7px 11px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
  white-space:nowrap;
}

.status-active{
  background:#dcfce7;
  color:#166534;
}

.status-stopped{
  background:#fee2e2;
  color:#991b1b;
}

.status-cancelled{
  background:#e5e7eb;
  color:#374151;
}

.badges{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:16px;
}

.badge{
  padding:7px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

.badge-electric{
  background:#fff7ed;
  color:#9a3412;
}

.badge-water{
  background:#ecfeff;
  color:#155e75;
}

.metrics{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-bottom:16px;
}

.metric{
  background:#f8fafc;
  border:1px solid #eef2f7;
  border-radius:16px;
  padding:12px;
}

.metric-title{
  color:var(--muted);
  font-size:12px;
  margin-bottom:5px;
}

.metric-value{
  font-size:18px;
  font-weight:800;
  word-break:break-word;
}

.assignment{
  background:#f8fafc;
  border:1px dashed #cbd5e1;
  padding:11px 12px;
  border-radius:16px;
  color:#475569;
  font-size:13px;
  margin-bottom:16px;
}

.card-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.action{
  border:0;
  border-radius:11px;
  padding:10px 12px;
  cursor:pointer;
  font-size:13px;
  font-weight:700;
}

.action-edit{
  background:#fef3c7;
  color:#92400e;
}

.empty-state{
  grid-column:1/-1;
  background:white;
  border:1px dashed #cbd5e1;
  border-radius:24px;
  padding:45px;
  text-align:center;
  color:var(--muted);
}

.drawer-backdrop{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.55);
  z-index:1000;
}

.drawer{
  position:fixed;
  top:0;
  left:0;
  width:520px;
  max-width:94vw;
  height:100vh;
  background:white;
  z-index:1001;
  transform:translateX(-110%);
  transition:.25s ease;
  box-shadow:20px 0 60px rgba(15,23,42,.24);
  display:flex;
  flex-direction:column;
}

.drawer.open{
  transform:translateX(0);
}

.drawer-header{
  padding:22px;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.drawer-header h2{
  font-size:24px;
}

.close{
  width:38px;
  height:38px;
  border:0;
  border-radius:12px;
  cursor:pointer;
  font-size:20px;
  background:#f1f5f9;
}

.drawer-body{
  padding:20px 22px;
  overflow:auto;
  flex:1;
}

.section{
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  margin-bottom:16px;
}

.section h3{
  margin-bottom:14px;
  font-size:17px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:13px;
}

.field label{
  display:block;
  font-weight:700;
  margin-bottom:7px;
  font-size:13px;
}

.required{
  color:var(--red);
}

textarea{
  min-height:100px;
  resize:vertical;
}

.drawer-actions{
  padding:16px 22px;
  border-top:1px solid var(--line);
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.message{
  display:none;
  margin-bottom:14px;
  padding:12px 14px;
  border-radius:12px;
  font-size:14px;
}

.message.success{
  display:block;
  background:#dcfce7;
  color:#166534;
}

.message.error{
  display:block;
  background:#fee2e2;
  color:#991b1b;
}

@media(max-width:1000px){
  .kpis{
    grid-template-columns:repeat(2,1fr);
  }

  .filters{
    grid-template-columns:1fr 1fr;
  }

  .property-strip{
    flex-direction:column;
    align-items:stretch;
  }

  .property-summary{
    min-width:0;
  }
}

@media(max-width:700px){
  .page{
    padding:16px;
  }

  .header{
    flex-direction:column;
  }

  .header-actions{
    width:100%;
  }

  .header-actions .btn,
  .user-pill{
    flex:1;
    text-align:center;
  }

  .kpis,
  .filters,
  .grid,
  .property-summary{
    grid-template-columns:1fr;
  }

  .cards{
    grid-template-columns:1fr;
  }

  .drawer{
    width:100%;
    max-width:100%;
  }

  .meter-title{
    font-size:20px;
  }

  .property-main h2{
    font-size:22px;
  }
}
</style>
</head>

<body>

<script>
const currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){
  window.location.href = "login.html";
}
</script>

<div class="page">

  <div class="header">
    <div class="title">
      <h1>عدادات العقار</h1>
      <p>إدارة عدادات الكهرباء والمياه وربطها بالوحدات عند الحاجة</p>
    </div>

    <div class="header-actions">
      <div class="user-pill">
        <strong id="userName"></strong>
        <span id="userRole"></span>
      </div>
      <button class="btn btn-dark" onclick="goUnits()">الوحدات</button>
      <button class="btn btn-dark" onclick="goProperties()">العقارات</button>
      <button class="btn btn-danger" onclick="logout()">خروج</button>
      <button class="btn btn-primary" onclick="openDrawer()">+ إضافة عداد</button>
    </div>
  </div>

  <div class="property-strip">
    <div class="property-main">
      <h2 id="propertyName">جاري تحميل العقار...</h2>
      <div class="property-meta" id="propertyMeta"></div>
    </div>

    <div class="property-summary">
      <div class="property-mini">
        <span>إجمالي العدادات</span>
        <strong id="summaryTotal">0</strong>
      </div>

      <div class="property-mini">
        <span>مرتبطة بوحدات</span>
        <strong id="summaryAssigned">0</strong>
      </div>

      <div class="property-mini">
        <span>على العقار مباشرة</span>
        <strong id="summaryPropertyOnly">0</strong>
      </div>
    </div>
  </div>

  <div class="kpis">
    <div class="kpi">
      <div class="kpi-label">إجمالي العدادات</div>
      <div class="kpi-value" id="kpiTotal">0</div>
    </div>

    <div class="kpi">
      <div class="kpi-label">عدادات الكهرباء</div>
      <div class="kpi-value" id="kpiElectric">0</div>
    </div>

    <div class="kpi">
      <div class="kpi-label">عدادات المياه</div>
      <div class="kpi-value" id="kpiWater">0</div>
    </div>

    <div class="kpi">
      <div class="kpi-label">العدادات النشطة</div>
      <div class="kpi-value" id="kpiActive">0</div>
    </div>
  </div>

  <div class="filters">
    <input id="searchInput" type="text" placeholder="ابحث برقم العداد أو رقم MET أو الوحدة..." onkeyup="applyFilters()">

    <select id="filterMeterType" onchange="applyFilters()">
      <option value="">كل الأنواع</option>
    </select>

    <select id="filterMeterStatus" onchange="applyFilters()">
      <option value="">كل الحالات</option>
    </select>
  </div>

  <div class="cards" id="metersCards">
    <div class="empty-state">جاري تحميل العدادات...</div>
  </div>

</div>

<div class="drawer-backdrop" id="drawerBackdrop" onclick="closeDrawer()"></div>

<div class="drawer" id="drawer">
  <div class="drawer-header">
    <h2>إضافة عداد</h2>
    <button class="close" onclick="closeDrawer()">×</button>
  </div>

  <div class="drawer-body">

    <div id="formMessage" class="message"></div>

    <div class="section">
      <h3>بيانات العداد</h3>

      <div class="grid">
        <div class="field">
          <label>نوع العداد <span class="required">*</span></label>
          <select id="meterType"></select>
        </div>

        <div class="field">
          <label>رقم العداد <span class="required">*</span></label>
          <input id="meterNumber" placeholder="مثال: 123456789">
        </div>

        <div class="field">
          <label>حالة العداد <span class="required">*</span></label>
          <select id="meterStatus"></select>
        </div>
      </div>
    </div>

    <div class="section">
      <h3>ربط العداد</h3>

      <div class="field">
        <label>الوحدة المرتبطة</label>
        <select id="assignedUnitId">
          <option value="">العقار مباشرة / عداد مشترك</option>
        </select>
      </div>
    </div>

  </div>

  <div class="drawer-actions">
    <button class="btn btn-primary" id="saveBtn" onclick="saveMeter()">حفظ العداد</button>
    <button class="btn btn-light" onclick="resetForm()">تفريغ</button>
    <button class="btn btn-danger" onclick="closeDrawer()">إلغاء</button>
  </div>
</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbw0dKIj7sUmNUBkWEwjCN61pyDcqrMmmLIfZhvIk3qIkiHDCrW2PNWUEN_2N9TIX-I6Yg/exec";

let property = null;
let meters = [];
let units = [];

const propertyId =
  new URLSearchParams(window.location.search).get("propertyId");

if(!propertyId){
  alert("لم يتم تحديد العقار");
  window.location.href = "properties.html";
}

document.getElementById("userName").innerText = currentUser?.name || "";
document.getElementById("userRole").innerText = " - " + (currentUser?.role || "");

initPage();

async function initPage(){
  await loadLookups();
  await loadProperty();
  await loadUnits();
  await loadMeters();
}

function logout(){
  localStorage.removeItem("currentUser");
  window.location.href = "login.html";
}

function goProperties(){
  window.location.href = "properties.html";
}

function goUnits(){
  window.location.href = "units.html?propertyId=" + encodeURIComponent(propertyId);
}

async function loadLookups(){
  await Promise.all([
    fillLookup("MeterType","meterType","اختر نوع العداد"),
    fillLookup("MeterStatus","meterStatus","اختر حالة العداد"),

    fillLookup("MeterType","filterMeterType","كل الأنواع"),
    fillLookup("MeterStatus","filterMeterStatus","كل الحالات")
  ]);
}

async function fillLookup(category, elementId, placeholder){
  const element = document.getElementById(elementId);
  if(!element) return;

  element.innerHTML = `<option value="">${placeholder}</option>`;

  try{
    const response = await fetch(
      API_URL + "?action=getLookupValues&category=" + encodeURIComponent(category)
    );

    const data = await response.json();

    if(data.success && Array.isArray(data.values)){
      data.values.forEach(value => {
        if(value !== ""){
          element.innerHTML += `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`;
        }
      });
    }
  }
  catch(error){
    console.error("Lookup Error:", category, error);
  }
}

async function loadProperty(){
  try{
    const response = await fetch(
      API_URL + "?action=getPropertyById&propertyId=" + encodeURIComponent(propertyId)
    );

    const data = await response.json();

    if(!data.success){
      alert("تعذر العثور على العقار");
      window.location.href = "properties.html";
      return;
    }

    property = data.property;

    document.getElementById("propertyName").innerText =
      property.PropertyName || "";

    document.getElementById("propertyMeta").innerHTML =
      `<span class="property-badge">${escapeHtml(property.PropertyID || "")}</span>
       &nbsp;&nbsp;
       ${escapeHtml(property.PropertyType || "")}
       •
       ${escapeHtml(property.City || "")}
       ${property.District ? " • " + escapeHtml(property.District) : ""}`;
  }
  catch(error){
    console.error(error);
    alert("حدث خطأ أثناء تحميل بيانات العقار");
  }
}

async function loadUnits(){
  try{
    const response = await fetch(
      API_URL + "?action=getUnits&propertyId=" + encodeURIComponent(propertyId)
    );

    const data = await response.json();

    if(data.success && Array.isArray(data.units)){
      units = data.units;
      fillUnitsDropdown();
    }
  }
  catch(error){
    console.warn("Units API error:", error);
  }
}

function fillUnitsDropdown(){
  const select = document.getElementById("assignedUnitId");

  select.innerHTML = `<option value="">العقار مباشرة / عداد مشترك</option>`;

  units.forEach(unit => {
    const text =
      (unit.UnitName || unit.UnitNo || unit.UnitID) +
      " - " +
      (unit.UnitType || "");

    select.innerHTML += `
      <option value="${escapeHtml(unit.UnitID || "")}">
        ${escapeHtml(text)}
      </option>
    `;
  });
}

async function loadMeters(){
  const container = document.getElementById("metersCards");
  container.innerHTML = `<div class="empty-state">جاري تحميل العدادات...</div>`;

  try{
    const response = await fetch(
      API_URL + "?action=getMeters&propertyId=" + encodeURIComponent(propertyId)
    );

    const data = await response.json();

    if(!data.success){
      container.innerHTML = `<div class="empty-state">تعذر تحميل العدادات</div>`;
      return;
    }

    meters = data.meters || [];

    updateKpis(meters);
    renderMeters(meters);
  }
  catch(error){
    console.error(error);
    container.innerHTML = `<div class="empty-state">حدث خطأ أثناء الاتصال بالنظام</div>`;
  }
}

function updateKpis(items){
  const total = items.length;
  const electric = items.filter(m => m.MeterType === "كهرباء").length;
  const water = items.filter(m => m.MeterType === "مياه").length;
  const active = items.filter(m => m.MeterStatus === "نشط").length;
  const assigned = items.filter(m => m.AssignedUnitID).length;
  const propertyOnly = total - assigned;

  document.getElementById("kpiTotal").innerText = total;
  document.getElementById("kpiElectric").innerText = electric;
  document.getElementById("kpiWater").innerText = water;
  document.getElementById("kpiActive").innerText = active;

  document.getElementById("summaryTotal").innerText = total;
  document.getElementById("summaryAssigned").innerText = assigned;
  document.getElementById("summaryPropertyOnly").innerText = propertyOnly;
}

function renderMeters(items){
  const container = document.getElementById("metersCards");
  container.innerHTML = "";

  if(!items || items.length === 0){
    container.innerHTML = `<div class="empty-state">لا توجد عدادات مسجلة لهذا العقار</div>`;
    return;
  }

  items.forEach(meter => {
    const isWater = meter.MeterType === "مياه";
    const icon = isWater ? "💧" : "⚡";
    const statusClass = getStatusClass(meter.MeterStatus);
    const assignmentText = getAssignmentText(meter.AssignedUnitID);

    container.innerHTML += `
      <div class="meter-card ${isWater ? "water" : ""}">
        <div class="card-head">
          <div>
            <div class="meter-title">${icon} عداد ${escapeHtml(meter.MeterType || "")}</div>
            <div class="meter-id">${escapeHtml(meter.MeterID || "")}</div>
          </div>

          <div class="meter-icon ${isWater ? "water" : ""}">
            ${icon}
          </div>
        </div>

        <div class="badges">
          <span class="badge ${isWater ? "badge-water" : "badge-electric"}">
            ${escapeHtml(meter.MeterType || "")}
          </span>

          <span class="status-badge ${statusClass}">
            ${escapeHtml(meter.MeterStatus || "")}
          </span>
        </div>

        <div class="metrics">
          <div class="metric">
            <div class="metric-title">رقم العداد</div>
            <div class="metric-value">${escapeHtml(meter.MeterNumber || "")}</div>
          </div>
        </div>

        <div class="assignment">
          مرتبط بـ: ${escapeHtml(assignmentText)}
        </div>

        <div class="card-actions">
          <button class="action action-edit" onclick="editMeter('${escapeAttr(meter.MeterID || "")}')">تعديل</button>
        </div>
      </div>
    `;
  });
}

function getAssignmentText(unitId){
  if(!unitId){
    return "العقار مباشرة / عداد مشترك";
  }

  const unit = units.find(u => u.UnitID === unitId);

  if(!unit){
    return unitId;
  }

  return unit.UnitName || unit.UnitNo || unit.UnitID;
}

function getStatusClass(status){
  if(status === "نشط") return "status-active";
  if(status === "موقوف") return "status-stopped";
  if(status === "ملغي") return "status-cancelled";
  return "status-cancelled";
}

function applyFilters(){
  const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
  const type = document.getElementById("filterMeterType").value;
  const status = document.getElementById("filterMeterStatus").value;

  const filtered = meters.filter(m => {
    const assignmentText = getAssignmentText(m.AssignedUnitID);

    const text = [
      m.MeterID,
      m.MeterType,
      m.MeterNumber,
      m.AssignedUnitID,
      assignmentText,
      m.MeterStatus
    ].join(" ").toLowerCase();

    return (
      (!keyword || text.includes(keyword)) &&
      (!type || m.MeterType === type) &&
      (!status || m.MeterStatus === status)
    );
  });

  updateKpis(filtered);
  renderMeters(filtered);
}

function openDrawer(){
  clearMessage();
  document.getElementById("drawerBackdrop").style.display = "block";
  document.getElementById("drawer").classList.add("open");
}

function closeDrawer(){
  document.getElementById("drawerBackdrop").style.display = "none";
  document.getElementById("drawer").classList.remove("open");
}

function resetForm(){
  [
    "meterType","meterNumber","assignedUnitId","meterStatus"
  ].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.value = "";
  });

  clearMessage();
}

function validateForm(){
  const fields = [
    ["meterType","نوع العداد"],
    ["meterNumber","رقم العداد"],
    ["meterStatus","حالة العداد"]
  ];

  for(const [id,label] of fields){
    const el = document.getElementById(id);

    if(!el.value.trim()){
      showMessage("يرجى تعبئة حقل: " + label, "error");
      el.focus();
      return false;
    }
  }

  return true;
}

async function saveMeter(){
  if(!validateForm()) return;

  const saveBtn = document.getElementById("saveBtn");
  saveBtn.disabled = true;
  saveBtn.innerText = "جاري الحفظ...";

  try{
    const params = new URLSearchParams({
      action:"addMeter",
      propertyId:propertyId,
      meterType:getValue("meterType"),
      meterNumber:getValue("meterNumber"),
      assignedUnitId:getValue("assignedUnitId"),
      meterStatus:getValue("meterStatus")
    });

    const response = await fetch(API_URL + "?" + params.toString());
    const result = await response.json();

    if(result.success){
      showMessage("تم حفظ العداد بنجاح: " + result.meterId, "success");
      await loadMeters();
      resetForm();

      setTimeout(() => {
        closeDrawer();
      }, 900);
    }
    else{
      showMessage("تعذر حفظ العداد", "error");
    }
  }
  catch(error){
    console.error(error);
    showMessage("حدث خطأ أثناء حفظ العداد", "error");
  }
  finally{
    saveBtn.disabled = false;
    saveBtn.innerText = "حفظ العداد";
  }
}

function getValue(id){
  const el = document.getElementById(id);
  return el ? el.value.trim() : "";
}

function showMessage(text,type){
  const msg = document.getElementById("formMessage");
  msg.className = "message " + type;
  msg.innerText = text;
}

function clearMessage(){
  const msg = document.getElementById("formMessage");
  msg.className = "message";
  msg.innerText = "";
}

function editMeter(meterId){
  alert("تعديل العداد: " + meterId + " - سيتم تفعيله لاحقاً");
}

function escapeHtml(value){
  return String(value)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function escapeAttr(value){
  return String(value)
    .replaceAll("\\","\\\\")
    .replaceAll("'","\\'")
    .replaceAll('"',"&quot;");
}
</script>
