<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>العقارات</title>

<style>
:root{
  --bg:#f6f8fb;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --line:#e5eaf1;
  --primary:#16a34a;
  --primary-dark:#15803d;
  --navy:#0f172a;
  --blue:#2563eb;
  --orange:#f59e0b;
  --red:#dc2626;
  --shadow:0 14px 35px rgba(15,23,42,.08);
  --radius:20px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Tahoma,Arial,sans-serif;
}

body{
  background:
    radial-gradient(circle at top left, rgba(22,163,74,.08), transparent 30%),
    var(--bg);
  color:var(--text);
  min-height:100vh;
}

.page{
  max-width:1440px;
  margin:0 auto;
  padding:28px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:20px;
  margin-bottom:22px;
}

.title h1{
  font-size:34px;
  letter-spacing:-.5px;
  margin-bottom:8px;
}

.title p{
  color:var(--muted);
  font-size:15px;
}

.header-actions{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}

.user-pill{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:999px;
  padding:10px 14px;
  box-shadow:0 6px 18px rgba(15,23,42,.05);
  font-size:13px;
  color:var(--muted);
}

.btn{
  border:0;
  border-radius:12px;
  padding:12px 18px;
  cursor:pointer;
  font-size:14px;
  font-weight:700;
  transition:.2s ease;
  white-space:nowrap;
}

.btn:hover{
  transform:translateY(-1px);
  opacity:.95;
}

.btn-primary{
  background:var(--primary);
  color:white;
}

.btn-dark{
  background:var(--navy);
  color:white;
}

.btn-light{
  background:#e2e8f0;
  color:#0f172a;
}

.btn-danger{
  background:var(--red);
  color:white;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  margin-bottom:18px;
}

.kpi{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:18px;
  box-shadow:var(--shadow);
  position:relative;
  overflow:hidden;
}

.kpi:before{
  content:"";
  position:absolute;
  inset:auto 0 0 0;
  height:4px;
  background:linear-gradient(90deg,var(--primary),#22c55e);
}

.kpi-label{
  color:var(--muted);
  font-size:13px;
  margin-bottom:10px;
}

.kpi-value{
  font-size:32px;
  font-weight:800;
  letter-spacing:-1px;
}

.filters{
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(8px);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:16px;
  display:grid;
  grid-template-columns:2fr 1fr 1fr 1fr;
  gap:12px;
  margin-bottom:22px;
}

input,
select,
textarea{
  width:100%;
  border:1px solid #d8e0ea;
  background:white;
  border-radius:12px;
  padding:12px 13px;
  font-size:14px;
  outline:none;
}

input:focus,
select:focus,
textarea:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 4px rgba(22,163,74,.12);
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(330px,1fr));
  gap:18px;
}

.property-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:24px;
  box-shadow:var(--shadow);
  padding:20px;
  transition:.2s ease;
  position:relative;
  overflow:hidden;
}

.property-card:hover{
  transform:translateY(-3px);
  box-shadow:0 18px 44px rgba(15,23,42,.12);
}

.property-card:before{
  content:"";
  position:absolute;
  top:0;
  right:0;
  width:7px;
  height:100%;
  background:var(--primary);
}

.card-head{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-bottom:14px;
}

.property-name{
  font-size:22px;
  font-weight:800;
  margin-bottom:7px;
}

.property-id{
  color:var(--muted);
  font-size:13px;
  direction:ltr;
  text-align:right;
}

.status-badge{
  align-self:flex-start;
  padding:7px 11px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
  white-space:nowrap;
}

.status-active{
  background:#dcfce7;
  color:#166534;
}

.status-inactive{
  background:#fee2e2;
  color:#991b1b;
}

.location{
  color:#475569;
  font-size:14px;
  margin-bottom:14px;
}

.badges{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:16px;
}

.badge{
  padding:7px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

.badge-type{
  background:#eef2ff;
  color:#3730a3;
}

.badge-rental{
  background:#fff7ed;
  color:#9a3412;
}

.badge-rental.units{
  background:#eff6ff;
  color:#1d4ed8;
}

.metrics{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:16px;
}

.metric{
  background:#f8fafc;
  border:1px solid #eef2f7;
  border-radius:16px;
  padding:12px;
}

.metric-title{
  color:var(--muted);
  font-size:12px;
  margin-bottom:5px;
}

.metric-value{
  font-size:20px;
  font-weight:800;
}

.owner{
  background:#f8fafc;
  border:1px dashed #cbd5e1;
  padding:11px 12px;
  border-radius:16px;
  color:#475569;
  font-size:13px;
  margin-bottom:16px;
}

.card-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.action{
  border:0;
  border-radius:11px;
  padding:10px 12px;
  cursor:pointer;
  font-size:13px;
  font-weight:700;
}

.action-units{
  background:#dcfce7;
  color:#166534;
}

.action-contracts{
  background:#e0f2fe;
  color:#075985;
}

.action-edit{
  background:#fef3c7;
  color:#92400e;
}

.empty-state{
  grid-column:1/-1;
  background:white;
  border:1px dashed #cbd5e1;
  border-radius:24px;
  padding:45px;
  text-align:center;
  color:var(--muted);
}

.drawer-backdrop{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.55);
  z-index:1000;
}

.drawer{
  position:fixed;
  top:0;
  left:0;
  width:520px;
  max-width:94vw;
  height:100vh;
  background:white;
  z-index:1001;
  transform:translateX(-110%);
  transition:.25s ease;
  box-shadow:20px 0 60px rgba(15,23,42,.24);
  display:flex;
  flex-direction:column;
}

.drawer.open{
  transform:translateX(0);
}

.drawer-header{
  padding:22px;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.drawer-header h2{
  font-size:24px;
}

.close{
  width:38px;
  height:38px;
  border:0;
  border-radius:12px;
  cursor:pointer;
  font-size:20px;
  background:#f1f5f9;
}

.drawer-body{
  padding:20px 22px;
  overflow:auto;
  flex:1;
}

.section{
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  margin-bottom:16px;
}

.section h3{
  margin-bottom:14px;
  font-size:17px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:13px;
}

.field label{
  display:block;
  font-weight:700;
  margin-bottom:7px;
  font-size:13px;
}

.required{
  color:var(--red);
}

textarea{
  min-height:100px;
  resize:vertical;
}

.drawer-actions{
  padding:16px 22px;
  border-top:1px solid var(--line);
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.message{
  display:none;
  margin-bottom:14px;
  padding:12px 14px;
  border-radius:12px;
  font-size:14px;
}

.message.success{
  display:block;
  background:#dcfce7;
  color:#166534;
}

.message.error{
  display:block;
  background:#fee2e2;
  color:#991b1b;
}

@media(max-width:1000px){
  .kpis{
    grid-template-columns:repeat(2,1fr);
  }

  .filters{
    grid-template-columns:1fr 1fr;
  }
}

@media(max-width:700px){
  .page{
    padding:16px;
  }

  .header{
    flex-direction:column;
  }

  .header-actions{
    width:100%;
  }

  .header-actions .btn,
  .user-pill{
    flex:1;
    text-align:center;
  }

  .kpis,
  .filters,
  .grid{
    grid-template-columns:1fr;
  }

  .cards{
    grid-template-columns:1fr;
  }

  .drawer{
    width:100%;
    max-width:100%;
  }

  .property-name{
    font-size:20px;
  }
}
</style>
</head>

<body>

<script>
const currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){
  window.location.href = "login.html";
}
</script>

<div class="page">

  <div class="header">
    <div class="title">
      <h1>العقارات</h1>
      <p>إدارة العقارات وربطها لاحقاً بالوحدات والعقود والعدادات</p>
    </div>

    <div class="header-actions">
      <div class="user-pill">
        <strong id="userName"></strong>
        <span id="userRole"></span>
      </div>
      <button class="btn btn-dark" onclick="goHome()">الرئيسية</button>
      <button class="btn btn-danger" onclick="logout()">خروج</button>
      <button class="btn btn-primary" onclick="openDrawer()">+ إضافة عقار</button>
    </div>
  </div>

  <div class="kpis">
    <div class="kpi">
      <div class="kpi-label">إجمالي العقارات</div>
      <div class="kpi-value" id="kpiTotal">0</div>
    </div>

    <div class="kpi">
      <div class="kpi-label">العقارات النشطة</div>
      <div class="kpi-value" id="kpiActive">0</div>
    </div>

    <div class="kpi">
      <div class="kpi-label">تأجير وحدات</div>
      <div class="kpi-value" id="kpiUnitsMode">0</div>
    </div>

    <div class="kpi">
      <div class="kpi-label">إجمالي الوحدات</div>
      <div class="kpi-value" id="kpiUnits">0</div>
    </div>
  </div>

  <div class="filters">
    <input id="searchInput" type="text" placeholder="ابحث باسم العقار أو الرقم أو الحي..." onkeyup="applyFilters()">

    <select id="filterPropertyType" onchange="applyFilters()">
      <option value="">كل الأنواع</option>
    </select>

    <select id="filterCity" onchange="applyFilters()">
      <option value="">كل المدن</option>
    </select>

    <select id="filterStatus" onchange="applyFilters()">
      <option value="">كل الحالات</option>
    </select>
  </div>

  <div class="cards" id="propertiesCards">
    <div class="empty-state">جاري تحميل العقارات...</div>
  </div>

</div>

<div class="drawer-backdrop" id="drawerBackdrop" onclick="closeDrawer()"></div>

<div class="drawer" id="drawer">
  <div class="drawer-header">
    <h2>إضافة عقار</h2>
    <button class="close" onclick="closeDrawer()">×</button>
  </div>

  <div class="drawer-body">

    <div id="formMessage" class="message"></div>

    <div class="section">
      <h3>بيانات العقار</h3>

      <div class="grid">
        <div class="field">
          <label>اسم العقار <span class="required">*</span></label>
          <input id="propertyName" placeholder="مثال: عمارة المروة">
        </div>

        <div class="field">
          <label>نوع العقار <span class="required">*</span></label>
          <select id="propertyType"></select>
        </div>

        <div class="field">
          <label>نمط التأجير <span class="required">*</span></label>
          <select id="rentalMode"></select>
        </div>

        <div class="field">
          <label>الحالة <span class="required">*</span></label>
          <select id="status"></select>
        </div>
      </div>
    </div>

    <div class="section">
      <h3>الموقع</h3>

      <div class="grid">
        <div class="field">
          <label>المدينة <span class="required">*</span></label>
          <select id="city"></select>
        </div>

        <div class="field">
          <label>الحي <span class="required">*</span></label>
          <input id="district" placeholder="مثال: المروة">
        </div>

        <div class="field" style="grid-column:1/-1">
          <label>العنوان</label>
          <input id="address" placeholder="وصف مختصر لموقع العقار">
        </div>
      </div>
    </div>

    <div class="section">
      <h3>بيانات الملكية</h3>

      <div class="grid">
        <div class="field">
          <label>رقم الصك</label>
          <input id="deedNo">
        </div>

        <div class="field">
          <label>تاريخ الصك</label>
          <input id="deedDate" type="date">
        </div>
      </div>
    </div>

    <div class="section">
      <h3>بيانات المالك</h3>

      <div class="grid">
        <div class="field">
          <label>اسم المالك</label>
          <input id="ownerName">
        </div>

        <div class="field">
          <label>جوال المالك</label>
          <input id="ownerMobile" placeholder="05xxxxxxxx">
        </div>
      </div>
    </div>

    <div class="section">
      <h3>بيانات التشغيل</h3>

      <div class="grid">
        <div class="field">
          <label>عدد الوحدات</label>
          <input id="plannedUnitsCount" type="number" min="0">
        </div>

        <div class="field">
          <label>عدد الأدوار</label>
          <input id="floorsCount" type="number" min="0">
        </div>
      </div>
    </div>

    <div class="section">
      <h3>ملاحظات</h3>
      <textarea id="notes" placeholder="أي ملاحظات إضافية"></textarea>
    </div>

  </div>

  <div class="drawer-actions">
    <button class="btn btn-primary" id="saveBtn" onclick="saveProperty()">حفظ العقار</button>
    <button class="btn btn-light" onclick="resetForm()">تفريغ</button>
    <button class="btn btn-danger" onclick="closeDrawer()">إلغاء</button>
  </div>
</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbw0dKIj7sUmNUBkWEwjCN61pyDcqrMmmLIfZhvIk3qIkiHDCrW2PNWUEN_2N9TIX-I6Yg/exec";

let properties = [];

document.getElementById("userName").innerText = currentUser?.name || "";
document.getElementById("userRole").innerText = " - " + (currentUser?.role || "");

initPage();

async function initPage(){
  await loadLookups();
  await loadProperties();
}

function logout(){
  localStorage.removeItem("currentUser");
  window.location.href = "login.html";
}

function goHome(){
  window.location.href = "index.html";
}

async function loadLookups(){
  await Promise.all([
    fillLookup("PropertyType","propertyType","اختر نوع العقار"),
    fillLookup("RentalMode","rentalMode","اختر نمط التأجير"),
    fillLookup("PropertyStatus","status","اختر الحالة"),
    fillLookup("Cities","city","اختر المدينة"),

    fillLookup("PropertyType","filterPropertyType","كل الأنواع", true),
    fillLookup("Cities","filterCity","كل المدن", true),
    fillLookup("PropertyStatus","filterStatus","كل الحالات", true)
  ]);
}

async function fillLookup(category, elementId, placeholder, keepPlaceholder){
  const element = document.getElementById(elementId);
  if(!element) return;

  element.innerHTML = `<option value="">${placeholder}</option>`;

  try{
    const response = await fetch(
      API_URL + "?action=getLookupValues&category=" + encodeURIComponent(category)
    );

    const data = await response.json();

    if(data.success && Array.isArray(data.values)){
      data.values.forEach(value => {
        if(value !== ""){
          element.innerHTML += `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`;
        }
      });
    }
  }
  catch(error){
    console.error("Lookup Error:", category, error);
  }
}

async function loadProperties(){
  const container = document.getElementById("propertiesCards");
  container.innerHTML = `<div class="empty-state">جاري تحميل العقارات...</div>`;

  try{
    const response = await fetch(API_URL + "?action=getProperties");
    const data = await response.json();

    if(!data.success){
      container.innerHTML = `<div class="empty-state">تعذر تحميل العقارات</div>`;
      return;
    }

    properties = data.properties || [];
    updateKpis(properties);
    renderProperties(properties);
  }
  catch(error){
    console.error(error);
    container.innerHTML = `<div class="empty-state">حدث خطأ أثناء الاتصال بالنظام</div>`;
  }
}

function updateKpis(items){
  const total = items.length;
  const active = items.filter(p => p.Status === "نشط").length;
  const unitsMode = items.filter(p => p.RentalMode === "تأجير وحدات").length;
  const units = items.reduce((sum,p) => sum + Number(p.PlannedUnitsCount || 0), 0);

  document.getElementById("kpiTotal").innerText = total;
  document.getElementById("kpiActive").innerText = active;
  document.getElementById("kpiUnitsMode").innerText = unitsMode;
  document.getElementById("kpiUnits").innerText = units;
}

function renderProperties(items){
  const container = document.getElementById("propertiesCards");
  container.innerHTML = "";

  if(!items || items.length === 0){
    container.innerHTML = `<div class="empty-state">لا توجد عقارات مطابقة</div>`;
    return;
  }

  items.forEach(property => {
    const isActive = property.Status === "نشط";
    const isUnits = property.RentalMode === "تأجير وحدات";

    container.innerHTML += `
      <div class="property-card">
        <div class="card-head">
          <div>
            <div class="property-name">${escapeHtml(property.PropertyName || "")}</div>
            <div class="property-id">${escapeHtml(property.PropertyID || "")}</div>
          </div>

          <span class="status-badge ${isActive ? "status-active" : "status-inactive"}">
            ${escapeHtml(property.Status || "")}
          </span>
        </div>

        <div class="location">
          📍 ${escapeHtml(property.City || "")} ${property.District ? "• " + escapeHtml(property.District) : ""}
        </div>

        <div class="badges">
          <span class="badge badge-type">${escapeHtml(property.PropertyType || "")}</span>
          <span class="badge badge-rental ${isUnits ? "units" : ""}">
            ${escapeHtml(property.RentalMode || "")}
          </span>
        </div>

        <div class="metrics">
          <div class="metric">
            <div class="metric-title">عدد الوحدات</div>
            <div class="metric-value">${escapeHtml(property.PlannedUnitsCount || "0")}</div>
          </div>

          <div class="metric">
            <div class="metric-title">عدد الأدوار</div>
            <div class="metric-value">${escapeHtml(property.FloorsCount || "0")}</div>
          </div>
        </div>

        <div class="owner">
          👤 المالك: ${escapeHtml(property.OwnerName || "غير محدد")}
        </div>

        <div class="card-actions">
          <button class="action action-units" onclick="openUnits('${escapeAttr(property.PropertyID || "")}')">الوحدات</button>
          <button class="action action-contracts" onclick="openContracts('${escapeAttr(property.PropertyID || "")}')">العقود</button>
          <button class="action action-edit" onclick="editProperty('${escapeAttr(property.PropertyID || "")}')">تعديل</button>
        </div>
      </div>
    `;
  });
}

function applyFilters(){
  const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
  const type = document.getElementById("filterPropertyType").value;
  const city = document.getElementById("filterCity").value;
  const status = document.getElementById("filterStatus").value;

  const filtered = properties.filter(p => {
    const text = [
      p.PropertyID,
      p.PropertyName,
      p.PropertyType,
      p.City,
      p.District,
      p.RentalMode,
      p.Status,
      p.OwnerName
    ].join(" ").toLowerCase();

    return (
      (!keyword || text.includes(keyword)) &&
      (!type || p.PropertyType === type) &&
      (!city || p.City === city) &&
      (!status || p.Status === status)
    );
  });

  updateKpis(filtered);
  renderProperties(filtered);
}

function openDrawer(){
  clearMessage();
  document.getElementById("drawerBackdrop").style.display = "block";
  document.getElementById("drawer").classList.add("open");
}

function closeDrawer(){
  document.getElementById("drawerBackdrop").style.display = "none";
  document.getElementById("drawer").classList.remove("open");
}

function resetForm(){
  [
    "propertyName","propertyType","rentalMode","status",
    "city","district","address","deedNo","deedDate",
    "ownerName","ownerMobile","plannedUnitsCount","floorsCount","notes"
  ].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.value = "";
  });

  clearMessage();
}

function validateForm(){
  const fields = [
    ["propertyName","اسم العقار"],
    ["propertyType","نوع العقار"],
    ["rentalMode","نمط التأجير"],
    ["status","الحالة"],
    ["city","المدينة"],
    ["district","الحي"]
  ];

  for(const [id,label] of fields){
    const el = document.getElementById(id);

    if(!el.value.trim()){
      showMessage("يرجى تعبئة حقل: " + label, "error");
      el.focus();
      return false;
    }
  }

  return true;
}

async function saveProperty(){
  if(!validateForm()) return;

  const saveBtn = document.getElementById("saveBtn");
  saveBtn.disabled = true;
  saveBtn.innerText = "جاري الحفظ...";

  try{
    const params = new URLSearchParams({
      action:"addProperty",
      propertyName:getValue("propertyName"),
      propertyType:getValue("propertyType"),
      city:getValue("city"),
      district:getValue("district"),
      address:getValue("address"),
      deedNo:getValue("deedNo"),
      deedDate:getValue("deedDate"),
      ownerName:getValue("ownerName"),
      ownerMobile:getValue("ownerMobile"),
      status:getValue("status"),
      rentalMode:getValue("rentalMode"),
      plannedUnitsCount:getValue("plannedUnitsCount"),
      floorsCount:getValue("floorsCount"),
      notes:getValue("notes")
    });

    const response = await fetch(API_URL + "?" + params.toString());
    const result = await response.json();

    if(result.success){
      showMessage("تم حفظ العقار بنجاح: " + result.propertyId, "success");
      await loadProperties();
      resetForm();

      setTimeout(() => {
        closeDrawer();
      }, 900);
    }
    else{
      showMessage("تعذر حفظ العقار", "error");
    }
  }
  catch(error){
    console.error(error);
    showMessage("حدث خطأ أثناء حفظ العقار", "error");
  }
  finally{
    saveBtn.disabled = false;
    saveBtn.innerText = "حفظ العقار";
  }
}

function getValue(id){
  const el = document.getElementById(id);
  return el ? el.value.trim() : "";
}

function showMessage(text,type){
  const msg = document.getElementById("formMessage");
  msg.className = "message " + type;
  msg.innerText = text;
}

function clearMessage(){
  const msg = document.getElementById("formMessage");
  msg.className = "message";
  msg.innerText = "";
}

function openUnits(id){
  window.location.href = "units.html?propertyId=" + encodeURIComponent(id);
}

function openContracts(id){
  alert("العقود للعقار: " + id + " - سيتم تفعيلها لاحقاً");
}

function editProperty(id){
  alert("تعديل العقار: " + id + " - سيتم تفعيله لاحقاً");
}

function escapeHtml(value){
  return String(value)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function escapeAttr(value){
  return String(value)
    .replaceAll("\\","\\\\")
    .replaceAll("'","\\'")
    .replaceAll('"',"&quot;");
}
