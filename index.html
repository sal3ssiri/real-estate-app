<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إدارة العقارات</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
background:#f5f7fa;
}

.header{
background:#1f2937;
color:white;
padding:20px;
}

.header h1{
font-size:28px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card h3{
font-size:14px;
color:#666;
margin-bottom:10px;
}

.card .value{
font-size:28px;
font-weight:bold;
color:#111;
}

.section{
padding:20px;
}

.property{
background:white;
padding:16px;
margin-bottom:12px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.property h2{
margin-bottom:8px;
}

.badge{
display:inline-block;
background:#16a34a;
color:white;
padding:4px 10px;
border-radius:20px;
font-size:12px;
}

</style>
</head>

<body>

<div class="header">
<h1>نظام إدارة العقارات</h1>
</div>

<div class="stats">

<div class="card">
<h3>العقارات</h3>
<div class="value">12</div>
</div>

<div class="card">
<h3>الوحدات</h3>
<div class="value">85</div>
</div>

<div class="card">
<h3>المستأجرون</h3>
<div class="value">78</div>
</div>

<div class="card">
<h3>العقود النشطة</h3>
<div class="value">74</div>
</div>

</div>

<div class="section">

<div class="property">
<h2>عمارة الياسمين</h2>
<p>الرياض - حي النرجس</p>
<br>
<span class="badge">نشط</span>
</div>

<div class="property">
<h2>مجمع الندى</h2>
<p>الرياض - حي الندى</p>
<br>
<span class="badge">نشط</span>
</div>

</div>

</body>
</html>
