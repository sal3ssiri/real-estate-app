<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تسجيل الدخول</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
width:420px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
text-align:center;
}

.logo{
font-size:42px;
margin-bottom:15px;
}

h1{
margin-bottom:30px;
font-size:40px;
}

#userInfo{
margin-top:20px;
display:none;
}

.success{
color:#16a34a;
font-weight:bold;
}

.error{
color:#dc2626;
font-weight:bold;
}

.user-name{
margin-top:10px;
font-size:18px;
}

.user-email{
margin-top:5px;
color:#64748b;
}

.loading{
color:#2563eb;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">🏢</div>

<h1>نظام إدارة العقارات</h1>

<div
id="g_id_onload"
data-client_id="1088052386307-70o0hm64ehh7kmjm4vrbgua5o2i80fgj.apps.googleusercontent.com"
data-callback="handleCredentialResponse">
</div>

<div
class="g_id_signin"
data-type="standard"
data-size="large"
data-theme="outline"
data-text="signin_with"
data-shape="rectangular"
data-logo_alignment="left">
</div>

<div id="userInfo"></div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbw0dKIj7sUmNUBkWEwjCN61pyDcqrMmmLIfZhvIk3qIkiHDCrW2PNWUEN_2N9TIX-I6Yg/exec";

function parseJwt(token){

const base64Url = token.split('.')[1];
const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');

return JSON.parse(atob(base64));

}

async function handleCredentialResponse(response){

const googleUser = parseJwt(response.credential);

document.getElementById("userInfo").style.display = "block";

document.getElementById("userInfo").innerHTML =
'<p class="loading">جاري التحقق من الصلاحيات...</p>';

try{

const result = await fetch(
API_URL +
'?action=validateUser&email=' +
encodeURIComponent(googleUser.email)
);

const data = await result.json();

if(!data.success){

document.getElementById("userInfo").innerHTML =
'<p class="error">غير مصرح لك بالدخول إلى النظام</p>';

return;

}

localStorage.setItem(
'currentUser',
JSON.stringify(data.user)
);

document.getElementById("userInfo").innerHTML =
`
<p class="success">تم تسجيل الدخول بنجاح</p>
<div class="user-name">${data.user.name}</div>
<div class="user-email">${data.user.email}</div>
`;

setTimeout(()=>{

window.location.href='index.html';

},1000);

}
catch(error){

console.error(error);

document.getElementById("userInfo").innerHTML =
'<p class="error">خطأ في الاتصال بالنظام</p>';

}

}

</script>

</body>

</html>
